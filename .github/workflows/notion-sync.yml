name: Notion Data Sync

on:
  push:
    branches: [ "main" ]
  schedule:
    # Her 30 dakikada bir çalıştır (UTC)
    - cron: '*/30 * * * *'
  workflow_dispatch: # GitHub Actions UI'dan manuel tetikleme

jobs:
  sync-notion-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install requests

      - name: Fetch Library Data (Notion → kitaplar.json)
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: python scripts/fetch_notion.py

      - name: Fetch Gamification Data (Notion → gamification.json)
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_GAMIFICATION_ID: ${{ secrets.NOTION_GAMIFICATION_ID }}
        run: python scripts/fetch_gamification.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add kitaplar.json gamification.json articles/
          git diff --staged --quiet || git commit -m "chore: auto-sync Notion data [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
