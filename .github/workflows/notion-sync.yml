name: Notion Library Sync

on:
  push:
    branches: [ "main" ]
  schedule:
    # Runs every day at midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows manual trigger from github actions UI

jobs:
  update-library:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Fetch Scripts
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          NOTION_GAMIFICATION_ID: ${{ secrets.NOTION_GAMIFICATION_ID }}
        run: |
          python scripts/fetch_notion.py
          python scripts/fetch_gamification.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "aas1112"
          git config --global user.email "ahmetardaszgnas@gmail.com"
          git add kitaplar.json
          git add gamification.json || true
          git commit -m "Auto-update :books: data from Notion"
          git push
