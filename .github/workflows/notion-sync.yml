name: Notion Data Sync

# Aynı anda birden fazla iş akışının çakışmasını önler.
# "cancel-in-progress: false" → yeni bir run başladığında eskisi tamamlanana kadar bekler.
concurrency:
  group: notion-sync
  cancel-in-progress: false

on:
  push:
    branches: [ "main" ]
  schedule:
    # Her 30 dakikada bir çalıştır (UTC)
    - cron: '*/30 * * * *'
  workflow_dispatch: # GitHub Actions UI'dan manuel tetikleme

jobs:
  sync-notion-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # fetch-depth: 0 → tam git geçmişi çekilir; shallow clone "fetch first" hatasına yol açar.
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install requests

      - name: Fetch Library Data (Notion → kitaplar.json)
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: python scripts/fetch_notion.py

      - name: Fetch Gamification Data (Notion → gamification.json)
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_GAMIFICATION_ID: ${{ secrets.NOTION_GAMIFICATION_ID }}
        run: python scripts/fetch_gamification.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Değişen dosyaları stage'e al
          git add kitaplar.json gamification.json articles/

          # Stage boşsa commit yapma, push'a gerek yok → işi bitir
          if git diff --staged --quiet; then
            echo "✅ Değişiklik yok, push atlanıyor."
            exit 0
          fi

          git commit -m "chore: auto-sync Notion data [$(date -u '+%Y-%m-%d %H:%M UTC')]"

          # Push öncesi uzaktaki değişiklikleri rebase ile entegre et.
          # Bu adım "fetch first / rejected" hatasını önler.
          git pull --rebase origin main

          # Push → başarısız olursa en fazla 3 kez yeniden dener (race condition koruması).
          for attempt in 1 2 3; do
            git push origin main && break || {
              echo "⚠️  Push başarısız (deneme $attempt/3). Rebase yapılıyor…"
              git pull --rebase origin main
            }
          done
